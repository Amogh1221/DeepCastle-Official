name: DeepCastle Stealth Monitor
on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: 

jobs:
  stealth-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install huggingface_hub requests

      - name: Run Stealth Check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c '
          import os
          import time
          import random
          import requests
          from huggingface_hub import HfApi

          SPACES = [
              "amogh1221/deepcastle-api",
              "amogh1221/deepcastle-api-2",
              "amogh1221/deepcastle-api-3",
              "amogh1221/deepcastle-api-4",
              "amogh1221/deepcastle-api-5"
          ]

          # 1. Start with a smaller "Jitter" delay (0 to 120 seconds)
          # This makes the "start time" different every cycle.
          jitter = random.randint(0, 120)
          print(f"Stealth jitter: Waiting {jitter} seconds before starting...")
          time.sleep(jitter)

          token = os.getenv("HF_TOKEN")
          run_number = int(os.getenv("GITHUB_RUN_NUMBER", "0"))
          api = HfApi(token=token)

          # Determine which space to rotationally restart this run (0 to 4)
          rotation_index = run_number % len(SPACES)
          print(f"Global Run Number: {run_number} | Targeting Index: {rotation_index}")

          for i, space_id in enumerate(SPACES):
              try:
                  url_name = space_id.replace("/", "-")
                  url = f"https://{url_name}.hf.space/"
                  
                  print(f"\n--- Checking Server {i+1}: {space_id} ---")
                  
                  # 2. Ping to wake up or keep alive
                  try:
                      requests.get(url, timeout=10)
                      print(f"Ping sent to {url}")
                  except:
                      pass

                  # 3. Check status and repair if needed
                  runtime = api.get_space_runtime(repo_id=space_id)
                  
                  if i == rotation_index:
                      print(f"Scheduled rotational restart for: {space_id}")
                      api.restart_space(repo_id=space_id)
                  elif runtime.stage in ["RUNTIME_ERROR", "PAUSED"]:
                      print(f"Repairing crashed space: {space_id}")
                      api.restart_space(repo_id=space_id)
                  else:
                      print(f"Status: Healthy ({runtime.stage})")

                  # 4. Add a smaller "Human-like" gap between servers (30 to 60 seconds)
                  if i < len(SPACES) - 1:
                      gap = random.randint(30, 60)
                      print(f"Stealth gap: Waiting {gap}s before checking next server...")
                      time.sleep(gap)

              except Exception as e:
                  print(f"Error: {e}")

          print("\nStealth check complete. All servers are safe.")
          '

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet"
          href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background-color: #0d1117; color: white; margin: 0; display: flex; justify-content: center; }
        #myBoard { width: 450px; }
        @media (min-width: 600px) { #myBoard { width: 550px; } }
    </style>
</head>
<body>
    <div id="myBoard"></div>

    <script>
    function sendMessage(value) {
        // Essential for Streamlit Custom Components
        window.parent.postMessage({
            isStreamlitMessage: true,
            type: "streamlit:setComponentValue",
            value: value
        }, "*");
    }

    var board = null;
    var game = new Chess();

    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        // User plays WHITE
        if (piece.search(/^b/) !== -1) return false;
    }

    function onDrop (source, target) {
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        if (move === null) return 'snapback';

        // Send UCI to Python
        sendMessage(move.from + move.to + "_" + Date.now());
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    // Essential for reading data from Streamlit
    function onStreamlitMessage(event) {
        if (event.data.type === "streamlit:render") {
            const fen = event.data.args.fen;
            if (fen && fen !== game.fen()) {
                game.load(fen);
                board.position(fen);
            }
        }
    }
    window.addEventListener("message", onStreamlitMessage);

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };
    board = Chessboard('myBoard', config);

    // Initial sizing and telling Streamlit the component is ready
    sendMessage(null);
    </script>
</body>
</html>
